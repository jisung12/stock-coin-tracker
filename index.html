<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARKET WATCH</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <!-- 메인 화면 -->
  <div id="main-view" class="container">
    <header>
      <div class="ticker-strip" id="ticker-strip">
        <div class="ticker-chip chip-fx" id="tk-fx">
          <div class="chip-top"><span class="chip-name">환율 USD/KRW</span></div>
          <div class="chip-price" id="tk-fx-price">-</div>
        </div>
        <div class="ticker-chip" id="tk-btc" onclick="showDetail('BTCUSDT','Bitcoin')">
          <div class="chip-top"><span class="chip-name">비트코인</span><span class="chip-chg" id="tk-btc-chg"></span></div>
          <div class="chip-price" id="tk-btc-price">-</div>
        </div>
        <div class="ticker-chip" id="tk-kospi">
          <div class="chip-top"><span class="chip-name">코스피</span><span class="chip-chg" id="tk-kospi-chg"></span></div>
          <div class="chip-price" id="tk-kospi-price">-</div>
        </div>
        <div class="ticker-chip" id="tk-kosdaq">
          <div class="chip-top"><span class="chip-name">코스닥</span><span class="chip-chg" id="tk-kosdaq-chg"></span></div>
          <div class="chip-price" id="tk-kosdaq-price">-</div>
        </div>
        <div class="ticker-chip" id="tk-sp500">
          <div class="chip-top"><span class="chip-name">S&amp;P 500</span><span class="chip-chg" id="tk-sp500-chg"></span></div>
          <div class="chip-price" id="tk-sp500-price">-</div>
        </div>
        <div class="ticker-chip" id="tk-nasdaq">
          <div class="chip-top"><span class="chip-name">나스닥</span><span class="chip-chg" id="tk-nasdaq-chg"></span></div>
          <div class="chip-price" id="tk-nasdaq-price">-</div>
        </div>
        <div class="ticker-chip" id="tk-dow">
          <div class="chip-top"><span class="chip-name">다우</span><span class="chip-chg" id="tk-dow-chg"></span></div>
          <div class="chip-price" id="tk-dow-price">-</div>
        </div>
      </div>
      <div class="ticker-hint">← 좌우로 밀어서 더 보기</div>
      <h1>MARKET WATCH</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="crypto">코인</button>
        <button class="tab" data-tab="stock">주식</button>
        <button class="tab" data-tab="etc">기타</button>
      </nav>
    </header>

    <main>
      <!-- 코인 섹션 -->
      <section id="crypto" class="tab-content active">
        <div class="info-bar">
          <p>시가총액 상위 30개 코인 (CoinMarketCap 기준) · Binance 실시간 시세</p>
          <span class="last-update">업데이트: -</span>
        </div>
        <div id="crypto-list" class="price-list">
          <div class="loading">로딩 중...</div>
        </div>
      </section>

      <!-- 주식 섹션 -->
      <section id="stock" class="tab-content">
        <div class="sub-tabs">
          <button class="sub-tab active" data-market="kr">국장</button>
          <button class="sub-tab" data-market="us">미장</button>
        </div>
        <div class="info-bar">
          <p id="stock-info-text">코스피 상위 30 · 한국투자증권 API</p>
          <span id="stock-last-update">업데이트: -</span>
        </div>
        <div id="stock-kr-list" class="price-list"></div>
        <div id="stock-us-list" class="price-list" style="display:none"></div>
      </section>

      <!-- 기타 섹션 (유가, 지수 등) -->
      <section id="etc" class="tab-content">
        <div class="info-bar">
          <p>유가 · 미국 지수 · 6시간 단위 갱신</p>
          <span class="last-update-etc">업데이트: -</span>
        </div>
        <div id="etc-list" class="price-list">
          <div class="loading">로딩 중...</div>
        </div>
      </section>
    </main>

    <footer>
      <p class="footer-sub">환율: exchangerate.fun (1시간 단위)</p>
    </footer>
  </div>

  <!-- 상세 화면 (차트) -->
  <div id="detail-view" class="container" style="display: none;">
    <header class="detail-header">
      <button id="back-btn" class="back-btn">← 뒤로</button>
      <div class="detail-coin-info">
        <img id="detail-icon" class="detail-icon" src="" alt="">
        <div>
          <div id="detail-name" class="detail-name"></div>
          <div id="detail-symbol" class="detail-symbol"></div>
        </div>
      </div>
      <div class="detail-price-info">
        <div id="detail-price" class="detail-price"></div>
        <div id="detail-change" class="detail-change"></div>
      </div>
    </header>

    <div class="chart-controls">
      <button class="chart-period" data-period="15m">15m</button>
      <button class="chart-period" data-period="1h">1H</button>
      <button class="chart-period active" data-period="4h">4H</button>
      <button class="chart-period" data-period="1d">1D</button>
      <button class="chart-period" data-period="1w">1W</button>
      <button class="chart-period" data-period="1M">1M</button>
    </div>

    <div id="chart-container"></div>

    <div class="detail-stats">
      <div class="stat-item">
        <span class="stat-label">24h 최고</span>
        <span id="stat-high" class="stat-value">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">24h 최저</span>
        <span id="stat-low" class="stat-value">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">24h 거래량</span>
        <span id="stat-volume" class="stat-value">-</span>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
