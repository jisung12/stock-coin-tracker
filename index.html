<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 시세</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <!-- 메인 화면 -->
  <div id="main-view" class="container">
    <header>
      <div class="exchange-rate">
        <span>USD/KRW</span>
        <span id="current-rate">-</span>
      </div>
      <h1>LIVE MARKET</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="crypto">코인</button>
        <button class="tab" data-tab="stock">주식</button>
        <button class="tab" data-tab="etc">기타</button>
      </nav>
    </header>

    <main>
      <!-- 코인 섹션 -->
      <section id="crypto" class="tab-content active">
        <div class="update-bar">
          <span class="last-update">업데이트: -</span>
        </div>
        <div id="crypto-list" class="price-list">
          <div class="loading">로딩 중...</div>
        </div>
      </section>

      <!-- 주식 섹션 -->
      <section id="stock" class="tab-content">
        <div id="stock-list" class="price-list"></div>
      </section>

      <!-- 기타 섹션 (금, 은, 원자재 등) -->
      <section id="etc" class="tab-content">
        <div class="update-bar">
          <span class="last-update-etc">업데이트: -</span>
        </div>
        <div id="etc-list" class="price-list">
          <div class="loading">로딩 중...</div>
        </div>
      </section>
    </main>

    <footer>
      <p class="footer-main">시가총액 상위 30개 코인 | 실시간 Binance 시세</p>
      <p class="footer-sub">환율: exchangerate.fun | 주식: 한국투자증권 | 귀금속: metals.dev</p>
    </footer>
  </div>

  <!-- 상세 화면 (차트) -->
  <div id="detail-view" class="container" style="display: none;">
    <header class="detail-header">
      <button id="back-btn" class="back-btn">← 뒤로</button>
      <div class="detail-coin-info">
        <img id="detail-icon" class="detail-icon" src="" alt="">
        <div>
          <div id="detail-name" class="detail-name"></div>
          <div id="detail-symbol" class="detail-symbol"></div>
        </div>
      </div>
      <div class="detail-price-info">
        <div id="detail-price" class="detail-price"></div>
        <div id="detail-change" class="detail-change"></div>
      </div>
    </header>

    <div class="chart-controls">
      <button class="chart-period" data-period="15m">15m</button>
      <button class="chart-period" data-period="1h">1H</button>
      <button class="chart-period active" data-period="4h">4H</button>
      <button class="chart-period" data-period="1d">1D</button>
      <button class="chart-period" data-period="1w">1W</button>
      <button class="chart-period" data-period="1M">1M</button>
    </div>

    <div id="chart-container"></div>

    <div class="detail-stats">
      <div class="stat-item">
        <span class="stat-label">24h 최고</span>
        <span id="stat-high" class="stat-value">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">24h 최저</span>
        <span id="stat-low" class="stat-value">-</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">24h 거래량</span>
        <span id="stat-volume" class="stat-value">-</span>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
